name: Windows RDP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    - name: Enable RDP
      run: |
        net user runneradmin Pass@123 /add
        net localgroup administrators runneradmin /add
        net localgroup "Remote Desktop Users" runneradmin /add
        reg add "HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server" /v fDenyTSConnections /t REG_DWORD /d 0 /f
        netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389
        net start TermService

    - name: Download ngrok
      run: |
        Invoke-WebRequest https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip -OutFile ngrok.zip
        Expand-Archive ngrok.zip

    - name: Setup ngrok
      run: |
        .\ngrok.exe config add-authtoken $Env:37sRU0DaHVolp5GDxJ4rTXQbcsH_5P1WRqs5V5GLhm7eocBZo

    - name: Start ngrok
      run: |
        Start-Process -NoNewWindow -FilePath ".\ngrok.exe" -ArgumentList "tcp 3389"

    - name: Show RDP Info
      run: |
        Start-Sleep -Seconds 15
        Invoke-RestMethod http://127.0.0.1:4040/api/tunnels

    - name: Keep Alive
      run: |
        while ($true) { Start-Sleep -Seconds 300 }
